<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册登录 - 原型</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
      font-size: 14px;
    }
    header {
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
    .logo { width: 32px; height: 32px; border-radius: 8px; background: #2563eb; color: #fff; display: grid; place-items: center; }
    main { min-height: calc(100vh - 60px); display: grid; place-items: center; padding: 24px; }
    .panel { width: min(920px, 100%); display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .intro { padding: 36px; background: #eef6ff; border-right: 1px solid #dbeafe; }
    .intro h1 { margin: 0 0 12px; font-size: 24px; }
    .intro p { color: #475569; line-height: 1.7; margin: 0 0 20px; }
    .intro ul { margin: 0; padding-left: 18px; color: #334155; line-height: 1.9; }
    .form { padding: 28px; }
    .tabs { display: flex; background: #f1f5f9; padding: 3px; border-radius: 8px; margin-bottom: 20px; }
    .tab { flex: 1; border: 0; background: transparent; padding: 9px; border-radius: 6px; cursor: pointer; font-weight: 600; color: #475569; }
    .tab.active { background: #fff; color: #2563eb; box-shadow: 0 1px 2px rgba(15,23,42,.08); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
    input { width: 100%; height: 38px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 0 10px; font-size: 14px; }
    input:focus { outline: 2px solid #bfdbfe; border-color: #2563eb; }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
    .btn { height: 38px; border: 0; border-radius: 6px; padding: 0 14px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
    .btn.secondary { background: #fff; color: #2563eb; border: 1px solid #bfdbfe; }
    .btn.full { width: 100%; margin-top: 18px; }
    .hint { font-size: 12px; color: #64748b; margin-top: 8px; line-height: 1.5; }
    .hidden { display: none; }
    .toast { position: fixed; right: 18px; bottom: 18px; background: #111827; color: #fff; padding: 10px 14px; border-radius: 6px; opacity: 0; transform: translateY(8px); transition: .2s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    a { color: #2563eb; text-decoration: none; }
    @media (max-width: 820px) {
      .panel { grid-template-columns: 1fr; }
      .intro { border-right: 0; border-bottom: 1px solid #dbeafe; padding: 24px; }
      header { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">MP</div><span>事务项目管理系统</span></div>
    <a href="index.html">原型导航</a>
  </header>
  <main>
    <section class="panel">
      <div class="intro">
        <h1>把每个项目的下一步放到眼前</h1>
        <p>注册后直接进入项目工作台，集中管理项目状态、日志、文档、里程碑和相关人。</p>
        <ul>
          <li>邮箱验证码注册，限制频繁发送</li>
          <li>普通用户只访问自己的项目数据</li>
          <li>管理员统一管理用户和用量</li>
        </ul>
      </div>
      <div class="form">
        <div class="tabs">
          <button class="tab active" data-tab="login">登录</button>
          <button class="tab" data-tab="register">注册</button>
        </div>
        <form id="loginForm">
          <label>邮箱</label>
          <input type="email" value="user@example.com">
          <label>密码</label>
          <input type="password" value="password">
          <button type="button" class="btn full" onclick="location.href='app.html'">登录并进入项目列表</button>
          <p class="hint">管理员可使用 admin@example.com 登录后台。</p>
        </form>
        <form id="registerForm" class="hidden">
          <label>邮箱</label>
          <input type="email" placeholder="name@example.com">
          <label>昵称</label>
          <input type="text" placeholder="例如：张经理">
          <label>密码</label>
          <input type="password" placeholder="至少 8 位">
          <div class="row">
            <div>
              <label>图形验证码</label>
              <input type="text" placeholder="输入 7K3A">
            </div>
            <button type="button" class="btn secondary" onclick="showToast('验证码已刷新')">刷新</button>
          </div>
          <div class="row">
            <div>
              <label>邮箱验证码</label>
              <input type="text" placeholder="6 位数字">
            </div>
            <button type="button" class="btn secondary" onclick="showToast('验证码已发送，60 秒后可重发')">发送验证码</button>
          </div>
          <button type="button" class="btn full" onclick="showToast('注册成功，已进入项目列表'); setTimeout(()=>location.href='app.html',700)">注册</button>
          <p class="hint">邮箱验证码 5 分钟内有效，同邮箱 60 秒内只能发送一次。</p>
        </form>
      </div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('loginForm').classList.toggle('hidden', btn.dataset.tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', btn.dataset.tab !== 'register');
      });
    });
    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }
  </script>
</body>
</html>
