<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人工作事务项目管理系统 - 原型导航</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
      font-size: 14px;
    }
    header {
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
    .logo { width: 32px; height: 32px; border-radius: 8px; background: #2563eb; color: #fff; display: grid; place-items: center; }
    main { max-width: 1180px; margin: 28px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    .sub { color: #64748b; margin: 0 0 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px; }
    .card h2 { font-size: 16px; margin: 0 0 8px; }
    .card p { color: #64748b; line-height: 1.6; min-height: 44px; margin: 0 0 16px; }
    a.btn { display: inline-block; text-decoration: none; color: #fff; background: #2563eb; padding: 8px 14px; border-radius: 6px; font-weight: 600; }
    .links { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    .links a { color: #2563eb; text-decoration: none; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } header { padding: 0 16px; } }
  </style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">MP</div><span>事务项目管理系统</span></div>
    <a href="app.html" class="btn">进入工作台</a>
  </header>
  <main>
    <h1>原型导航</h1>
    <p class="sub">初版原型覆盖注册登录、普通用户项目工作台、项目详情抽屉、日志、文档、相关人和管理员后台。</p>
    <section class="grid">
      <article class="card">
        <h2>注册与登录</h2>
        <p>邮箱、昵称、密码、验证码注册；登录后进入项目列表。</p>
        <a class="btn" href="auth.html">打开页面</a>
      </article>
      <article class="card">
        <h2>项目工作台</h2>
        <p>高密度项目列表、检索、分页、状态标签、里程碑进度和项目详情抽屉。</p>
        <a class="btn" href="app.html">打开页面</a>
      </article>
      <article class="card">
        <h2>管理员后台</h2>
        <p>用户新增、编辑、重置密码、冻结启用、项目数量和附件用量统计。</p>
        <a class="btn" href="admin.html">打开页面</a>
      </article>
    </section>
    <div class="links">
      <a href="../02-requirements.md">需求规格说明</a>
      <a href="../../references/ui-ux-standards.md">UI/UX 标准</a>
    </div>
  </main>
</body>
</html>
