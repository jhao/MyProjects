<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录注册 - 事务项目管理系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-intro">
      <div class="brand"><span class="logo">MP</span><strong>事务项目管理系统</strong></div>
      <h1>把每个项目的下一步放到眼前</h1>
      <p>集中管理项目状态、日志、文档、里程碑和相关人，适合个人商务与项目负责人日常跟进。</p>
    </section>
    <section class="auth-card">
      <div class="seg">
        <button class="active" data-auth-tab="login">登录</button>
        <button data-auth-tab="register">注册</button>
      </div>
      <form id="loginForm" class="form">
        <label>账号或邮箱<input name="account" autocomplete="username" required></label>
        <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
        <div class="captcha-row">
          <label>图形验证码<input name="captcha" required></label>
          <img class="captcha-img" data-captcha alt="图形验证码" title="点击刷新">
        </div>
        <button class="primary" type="submit">登录</button>
        <button class="text-btn forgot-btn" type="button" id="forgotBtn">忘记密码</button>
      </form>
      <form id="registerForm" class="form hidden">
        <label>邮箱<input name="email" type="email" required></label>
        <label>昵称<input name="nickname" required></label>
        <label>密码<input name="password" type="password" minlength="6" required></label>
        <div class="captcha-row">
          <label>图形验证码<input name="captcha" required></label>
          <img class="captcha-img" data-captcha alt="图形验证码" title="点击刷新">
        </div>
        <div class="inline">
          <label>邮箱验证码<input name="code" placeholder="6 位数字" required></label>
          <button class="secondary" type="button" id="sendCode">发送邮箱验证码</button>
        </div>
        <button class="primary" type="submit">注册并进入系统</button>
      </form>
    </section>
  </main>
  <div id="forgotModal" class="modal hidden">
    <section class="modal-card">
      <h2>重置密码</h2>
      <form id="forgotForm" class="form">
        <label>注册邮箱<input name="email" type="email" required></label>
        <div class="captcha-row">
          <label>图形验证码<input name="captcha" required></label>
          <img class="captcha-img" data-captcha alt="图形验证码" title="点击刷新">
        </div>
        <div class="inline">
          <label>邮箱验证码<input name="code" required></label>
          <button class="secondary" type="button" id="sendResetCode">发送重置验证码</button>
        </div>
        <label>新密码<input name="password" type="password" minlength="6" required></label>
        <div class="modal-actions"><button class="secondary" type="button" id="closeForgot">取消</button><button class="primary">重置密码</button></div>
      </form>
    </section>
  </div>
  <div id="toast" class="toast"></div>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
