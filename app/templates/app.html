<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目工作台 - 事务项目管理系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">MP</span><strong>事务项目管理系统</strong></div>
    <div class="top-actions"><span id="meName"></span><button id="logoutBtn" class="secondary small">退出</button></div>
  </header>
  <main class="page">
    <section class="metrics" id="metricsSection">
      <div class="metrics-body">
        <div><span class="metric-label">项目总数</span><strong class="metric-value" id="metricTotal">0</strong></div>
        <div><span class="metric-label">当前页</span><strong class="metric-value" id="metricPage">1</strong></div>
        <div><span class="metric-label">已筛选</span><strong class="metric-value" id="metricFiltered">0</strong></div>
        <div><span class="metric-label">查询方式</span><strong class="metric-value">手动</strong></div>
      </div>
      <div class="category-metrics" id="categoryAmountStats"></div>
    </section>
    <section class="filters two-row" id="filtersSection">
      <div class="filters-head">
        <button class="collapse-btn" id="toggleFilters" title="收起/展开">▼</button>
        <span class="filters-summary" id="filtersSummary"></span>
      </div>
      <div class="filters-body" id="filtersBody">
        <label class="wide">全文检索<input id="q" data-filter placeholder="项目名称 / 日志 / 文档"></label>
        <label>所属目录关键词<input id="folder" data-filter placeholder="重点客户 / 2026实施"></label>
        <label>项目分类
          <div class="multi-select" id="categorySelect">
            <div class="multi-select-input">
              <div class="multi-select-tags" id="categoryTags"></div>
              <input type="text" class="multi-select-placeholder" id="categoryInput" placeholder="全部数据" readonly>
              <button type="button" class="multi-select-clear" id="categoryClear">×</button>
            </div>
            <div class="multi-select-dropdown" id="categoryDropdown"></div>
          </div>
        </label>
        <label>项目状态
          <div class="multi-select" id="statusSelect">
            <div class="multi-select-input">
              <div class="multi-select-tags" id="statusTags"></div>
              <input type="text" class="multi-select-placeholder" id="statusInput" placeholder="全部数据" readonly>
              <button type="button" class="multi-select-clear" id="statusClear">×</button>
            </div>
            <div class="multi-select-dropdown" id="statusDropdown"></div>
          </div>
        </label>
        <label class="date-filter">启动日期范围<span class="range"><input id="startFrom" data-filter type="date"><input id="startTo" data-filter type="date"></span></label>
        <label class="date-filter">最后更新范围<span class="range"><input id="updatedFrom" data-filter type="date"><input id="updatedTo" data-filter type="date"></span></label>
      </div>
      <div class="filter-actions"><button id="resetFilters" class="secondary">重置</button><button id="searchBtn" class="primary">检索</button><button id="exportBtn" class="secondary">导出</button><button id="newProjectBtn" class="primary">新建项目</button></div>
    </section>
    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th><button class="sort desc" data-sort="name">项目名称</button></th>
            <th><button class="sort" data-sort="folder">所属目录</button></th>
            <th><button class="sort" data-sort="category">分类</button></th>
            <th><button class="sort" data-sort="start_date">启动日期</button></th>
            <th>项目状态</th>
            <th><button class="sort" data-sort="amounts"><span class="amount-contract">合同</span><span class="amount-invoice">/开票</span><span class="amount-receive">/回款</span></button></th>
            <th><button class="sort" data-sort="updated_at">最后更新</button></th>
            <th>最新日志</th>
            <th><button class="sort" data-sort="next_node_date">下一步项目节点</button></th>
            <th><button class="sort" data-sort="milestone">里程碑</button></th>
            <th class="right">操作</th>
          </tr>
        </thead>
        <tbody id="projectRows"></tbody>
      </table>
      <div class="pager"><span id="pageInfo"></span><div class="pager-actions"><button id="prevPage" class="page-btn">上一页</button><button id="nextPage" class="page-btn">下一页</button><select id="perPage" data-filter><option>10</option><option>20</option><option>50</option><option>100</option></select></div></div>
    </section>
  </main>

  <div id="drawer" class="drawer">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer-content">
      <div class="drawer-head"><div><h2 id="drawerTitle"></h2><p id="drawerMeta" class="muted"></p></div><button id="closeDrawer" class="secondary small">关闭</button></div>
      <nav class="drawer-tabs">
        <button class="active" data-tab="milestones">项目里程碑设计</button>
        <button data-tab="logs">项目日志</button>
        <button data-tab="documents">项目相关文档</button>
        <button data-tab="people">项目相关人</button>
      </nav>
      <section id="tab-milestones" class="tab-body"></section>
      <section id="tab-logs" class="tab-body hidden"></section>
      <section id="tab-documents" class="tab-body hidden"></section>
      <section id="tab-people" class="tab-body hidden"></section>
    </div>
  </div>
  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast"></div>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
